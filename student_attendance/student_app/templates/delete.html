<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Student</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}



/* Warning card */
.warning-card{
    max-width:500px;
    margin:80px auto;
    padding:25px;
    border-radius:12px;
    background:#f8d7da; /* light red */
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<!-- CONTENT -->
<div class="container">

    <div class="warning-card text-center">

        <h3 class="mb-3">Caution</h3>
        <p class="mb-4">
            Are you sure you would wish to delete {{ student.name }} ?
        </p>

        <form method="POST" action="/delete/{{ student.id }}">
            {% csrf_token %}

            <div class="d-flex justify-content-center gap-3">

                <!-- YES DELETE -->
                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>

                <!-- CANCEL -->
                <a href="/" class="btn btn-secondary">
                    No, Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
