<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Student Record</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .status-true {
            color: green;
            font-weight: bold;
        }

        .status-false {
            color: red;
            font-weight: bold;
        }

        .actions a {
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Student Record</span>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-5">
        <h3 class="mb-4">Student Record</h3>

        <div class="card p-4">
            <h4 class="mb-3">{{ student.name }}</h4>

            <p><strong>Gender:</strong> {{ student.gender }}</p>
            <p><strong>Date of Birth:</strong>{{ student.dob }}</p>
            <p><strong>Stream:</strong>{{ student.stream }}</p>
            <p><strong>Student ID:</strong> {{student.student_id}} </p>
            <p>
                <strong>Status:</strong>
                <span class="status-true">{{ student.is_present }}</span>
            </p>
            <p><strong>Date:</strong> {{ student.date }}</p>

            <!-- BACK LINK -->
            <div class="mt-4">
                <a href="#" class="btn btn-primary btn-sm">← Back to List</a>
            </div>
        </div>
    </div>
</body>

</html>
