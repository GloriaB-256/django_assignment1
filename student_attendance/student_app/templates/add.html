<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Attendance Form</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: #f4f6f9;
}

.form-container{
    max-width: 600px;
    margin: 50px auto;
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

.btn-primary{
    background-color: #0d6efd;
    border: none;
}

</style>
</head>

<body>

<div class="container">
    <div class="form-container">

        <h3 class="text-center mb-4">Please fill in the form</h3>

        <form action="/add" method="POST">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input name="name" type="text" class="form-control" placeholder="Enter student name" required>
            </div>

            <!-- Gender -->
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="">Select gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <!-- DOB -->
            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input name="dob" type="date" class="form-control" required>
            </div>

            <!-- Stream -->
            <div class="mb-3">
                <label class="form-label">Stream</label>
                <input name="stream" type="text" class="form-control" placeholder="Enter stream" required>
            </div>

            <!-- Student ID -->
            <div class="mb-3">
                <label class="form-label">Student ID</label>
                <input name="student_id" type="text" class="form-control" placeholder="Enter student ID" required>
            </div>

            <!-- Status -->
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="is_present" class="form-select" required>
                    <option value="" disabled selected>Select status</option>
                    <option value="True">Present</option>
                    <option value="False">Absent</option>
                </select>
            </div>

            <!-- Date -->
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input name="date" type="date" class="form-control" required>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>

        </form>

    </div>
</div>

</body>
</html>
