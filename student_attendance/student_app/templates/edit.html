<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Student</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

/* Form card */
.form-card{
    max-width:700px;
    margin:50px auto;
    padding:25px;
    border-radius:12px;
    background:#fff;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<!-- CONTENT -->
<div class="container">

    <div class="form-card">

        <h3 class="mb-4 text-center">Edit Student Record</h3>

        <form method="POST" action="/edit/{{ student.id }}">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control"
                       placeholder="Enter student name"
                       value="{{ student.name}}" required>
            </div>

            <!-- Gender -->
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="{{ student.gender }}" selected>Select gender</option>
                    <option value="{{ student.male }}" >Male</option>
                    <option value="{{ student.female}}">Female</option>
                </select>
            </div>

            <!-- DOB -->
            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="dob" class="form-control"
                       value="{{ student.dob }}" required>
            </div>

            <!-- Stream -->
            <div class="mb-3">
                <label class="form-label">Stream</label>
                <input type="text" name="stream" class="form-control"
                       placeholder="Enter stream (e.g. Science, Arts)"
                       value="{{ student.stream }}" required>
            </div>

            <!-- Student ID -->
            <div class="mb-3">
                <label class="form-label">Student ID</label>
                <input type="text" name="student_id" class="form-control"
                       placeholder="Enter student ID"
                       value="{{ student.student_id}}" required>
            </div>

            <!-- Is Present -->
            <div class="mb-3">
                <label class="form-label">Is Present</label>
                <select name="is_present" value="{{ student.is_present}}" class="form-select" selected required>
                    <option value="{{ student.true}}">True</option>
                    <option value="{{ student.false }}">False</option>
                </select>
            </div>

            <!-- Date -->
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control"
                       value="{{ student.date }}" required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">
                Save Changes
            </button>

        </form>

    </div>

</div>

</body>
</html>
